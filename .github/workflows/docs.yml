name: Docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "src/povineq/**/*.py"
      - "pyproject.toml"
  workflow_dispatch:

concurrency:
  group: deploy-docs
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.10.2"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --extra docs

      - name: Build docs
        run: uv run mkdocs build --strict

      - name: Validate generated reference pages
        run: python -c "import pathlib; pages = list(pathlib.Path('site/reference').glob('*.html')); assert pages, 'Reference pages missing from site/reference/'"

      - name: Deploy docs
        run: uv run mkdocs gh-deploy
